packages:
  - package: dbt-labs/dbt_utils
    version: [">=1.1.0", "<2.0.0"]

  # Private Git package — authenticated via DBT_ENV_SECRET_GIT_TOKEN from env.yml secrets.
  # The token is injected from your Snowflake secret and masked (****) in all logs.
  # Uncomment and replace with your actual repo:
  # - git: "https://{{env_var('DBT_ENV_SECRET_GIT_TOKEN')}}@github.com/your-org/your-private-repo.git"
  #   revision: main
  #   subdirectory: "optional/subfolder"
