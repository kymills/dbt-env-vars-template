env_config:
  default_environment: dev

  environments:
    # ─── DEV ─────────────────────────────────────────────────────────────────────
    # Each engineer gets an isolated schema named after their Snowflake username.
    # Data window is wide open so dev can query all history.
    # Secrets enable pulling private Git packages via dbt deps.
    - name: dev
      secrets:
        - snowflake_secret: "SEMANTIC_VIEWS_DEMO.DBT_PROJECTS.{{ current_user }}_DBT_GIT_SECRET"
          env_var_name: DBT_ENV_SECRET_GIT_TOKEN
      env:
        DBT_DATABASE: SEMANTIC_VIEWS_DEMO
        DBT_SCHEMA: "{{ select CURRENT_USER() }}"
        DBT_WAREHOUSE: "{{ select CURRENT_WAREHOUSE() }}"
        DBT_ROLE: "{{ select CURRENT_ROLE() }}"
        DBT_DATA_INTERVAL_START: "2020-01-01 00:00:00"
        DBT_DATA_INTERVAL_END: "2099-12-31 23:59:59"

    # ─── STAGING ─────────────────────────────────────────────────────────────────
    # Rolling 7-day window for integration testing.
    - name: staging
      secrets:
        - snowflake_secret: "SEMANTIC_VIEWS_DEMO.DBT_PROJECTS.{{ current_user }}_DBT_GIT_SECRET"
          env_var_name: DBT_ENV_SECRET_GIT_TOKEN
      env:
        DBT_DATABASE: SEMANTIC_VIEWS_DEMO
        DBT_SCHEMA: STAGING
        DBT_WAREHOUSE: "{{ select CURRENT_WAREHOUSE() }}"
        DBT_ROLE: "{{ select CURRENT_ROLE() }}"
        DBT_DATA_INTERVAL_START: "{{ select (DATE_TRUNC('DAY', CURRENT_TIMESTAMP()) - INTERVAL '7 DAY')::string }}"
        DBT_DATA_INTERVAL_END: "{{ select DATE_TRUNC('DAY', CURRENT_TIMESTAMP())::string }}"

    # ─── PROD ────────────────────────────────────────────────────────────────────
    # Yesterday's full day — ideal for scheduled nightly builds.
    # Uses a shared team secret for CI/CD service accounts.
    - name: prod
      secrets:
        - snowflake_secret: SEMANTIC_VIEWS_DEMO.DBT_PROJECTS.DBT_GIT_SECRET
          env_var_name: DBT_ENV_SECRET_GIT_TOKEN
      env:
        DBT_DATABASE: SEMANTIC_VIEWS_DEMO
        DBT_SCHEMA: ANALYTICS
        DBT_WAREHOUSE: "{{ select CURRENT_WAREHOUSE() }}"
        DBT_ROLE: "{{ select CURRENT_ROLE() }}"
        DBT_DATA_INTERVAL_START: "{{ select (DATE_TRUNC('DAY', CURRENT_TIMESTAMP()) - INTERVAL '1 DAY')::string }}"
        DBT_DATA_INTERVAL_END: "{{ select DATE_TRUNC('DAY', CURRENT_TIMESTAMP())::string }}"
